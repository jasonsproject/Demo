controller:
  imagePullSecrets:
    - name: $${aliyun-pull-secret}

  serviceAccount:
    create: true
    name: jenkins
  
  image:
    registry: "docker.m.daocloud.io"
  runAsUser: 0
  runAsGroup: 0
  javaOpts: "-Djenkins.install.runSetupWizard=false -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.LAUNCH_DIAGNOSTICS=true"
  
  # Mount sensitive credentials from Kubernetes Secret
  containerEnv:
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: admin-password
    - name: ALIYUN_REGISTRY_USER
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: aliyun-registry-user
    - name: ALIYUN_REGISTRY_PASS
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: aliyun-registry-pass
    - name: GITHUB_USER
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: github-user
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: github-token

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - blueocean
    - credentials-binding
    - job-dsl

  # Mainland China Mirror
  updateCenter: "https://mirrors.tuna.tsinghua.edu.cn/jenkins/updates/update-center.json"

  # JCasC Configuration
  JCasC:
    enabled: true
    configScripts:
      # Integrated configuration to avoid conflicting 'jenkins:' blocks
      jenkins-core: |
        jenkins:
          systemMessage: "DevOps Demo"
          securityRealm:
            local:
              allowsSignup: false
              users:
                - id: "admin"
                  password: "$${JENKINS_ADMIN_PASSWORD}"
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc.cluster.local"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                templates:
                  - name: "jenkins-agent"
                    label: "jnlp"
                    containers:
                      - name: "jnlp"
                        image: "docker.m.daocloud.io/jenkins/jnlp-slave:alpine"
                        privileged: false
                        alwaysPullImage: false
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: "aliyun-registry-creds"
                      username: "$${ALIYUN_REGISTRY_USER}"
                      password: "$${ALIYUN_REGISTRY_PASS}"
                      description: "Alibaba Cloud Container Registry"
                  - usernamePassword:
                      scope: GLOBAL
                      id: "github-creds"
                      username: "$${GITHUB_USER}"
                      password: "$${GITHUB_TOKEN}"
                      description: "GitHub Credentials"
      
      # Automated Job creation via Job DSL
      jenkins-jobs: |
        jobs:
          - script: |
              pipelineJob('Demo-Pipeline') {
                definition {
                  cps {
                    script('''${JENKINSFILE_CONTENT}'''.stripIndent())
                    sandbox()
                  }
                }
              }

  # Service Configuration (Inside controller block for official chart)
  serviceType: LoadBalancer
  servicePort: 8080
  targetPort: 8080

# --- Global Settings (Outside controller block) ---

# Persistence for Docker Desktop
persistence:
  enabled: true
  storageClass: "hostpath"
  size: "10Gi"

# Ingress configuration
ingress:
  enabled: true
  apiVersion: "networking.k8s.io/v1"
  ingressClassName: "nginx"
  labels: {}
  annotations:
    kubernetes.io/ingress.class: nginx
  hostName: jenkins.local
  path: /
