# 绿色版本 (Green Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: jenkins
  labels:
    app: demo
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      version: green
  template:
    metadata:
      labels:
        app: demo
        version: green
    spec:
      imagePullSecrets:
        - name: aliyun-pull-secret
      containers:
        - name: app
          image: crpi-v1qihtqp9ipem36a.cn-shanghai.personal.cr.aliyuncs.com/imbucket/bucket 
          ports:
            - containerPort: 80
          env:
            - name: APP_VERSION
              value: "green"