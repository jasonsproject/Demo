apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: jenkins
  labels:
    app: demo
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      version: green
  template:
    metadata:
      labels:
        app: demo
        version: green
    spec:
      containers:
      - name: app
        image: crpi-v1qihtqp9ipem36a.cn-shanghai.personal.cr.aliyuncs.com/imbucket/bucket:green
        ports:
        - containerPort: 8090
        env:
        - name: APP_VERSION
          value: "green"
